name: Docker Image Live Builder (v3.12.0)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Author's Latest Source Code
        run: |
          # 1. 直接克隆原作者的最新的全部源码
          git clone https://github.com/akiralereal/iptv.git .
          
      - name: Live Build Docker Image
        run: |
          # 2. 在云端根据最新源码现场编译出属于你的 v3.12.0 镜像
          docker build -t akiralereal/iptv:v3.12.0 .
          
      - name: Save Image to Tar
        run: |
          # 3. 把新鲜出炉的真正新镜像打包
          docker save -o iptv.tar akiralereal/iptv:v3.12.0
          
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-v3.12.0-real
          path: iptv.tar
