name: Docker Image Packer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save Docker Image
        run: |
          # 升级到作者提示的最新 v3.7.0 版本
          docker pull akiralereal/iptv:v3.7.0
          docker save -o iptv.tar akiralereal/iptv:v3.7.0
          
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-image-tar
          path: iptv.tar
