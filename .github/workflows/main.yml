name: Docker Image Packer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save Docker Image
        run: |
          # 抓取原作者最最最新的主分支镜像
          docker pull akiralereal/iptv:latest
          docker save -o iptv.tar akiralereal/iptv:latest
          
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-image-tar
          path: iptv.tar
